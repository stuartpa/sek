name: release

# On a version tag (v*), validate SEK end-to-end, build the release assets
# (the Spec Kit extension archive + the `sek` .NET tool package), and publish a
# GitHub Release with those assets attached.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading v), e.g. 0.1.0"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate (build + explore all samples)
        shell: pwsh
        run: ./scripts/validate.ps1

      - name: Pack release assets
        shell: pwsh
        run: ./scripts/pack-extension.ps1 -Version ${{ steps.ver.outputs.version }} -Configuration Release

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --title "SpecExplorerKit v${{ steps.ver.outputs.version }}" \
            --notes-file "docs/release-notes/v${{ steps.ver.outputs.version }}.md" \
            "dist/spec-kit-sek.zip" \
            "dist/SpecExplorerKit.Tool.${{ steps.ver.outputs.version }}.nupkg"
