name: release

# On a version tag (v*), validate SEK end-to-end, build the release assets
# (the Spec Kit extension archive + the `sek` .NET tool package), and publish a
# GitHub Release with those assets attached.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading v), e.g. 0.1.0"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Provision Z3 native (Linux)
        shell: bash
        run: |
          # Microsoft.Z3 4.12.2 ships native libs for win-x64 and osx-x64 but NOT
          # linux-x64, and the runner's system libz3 (from LLVM) is too old. Fetch the
          # matching official Z3 4.12.2 libz3.so so exploration can use Z3 on Linux.
          ver=4.12.2
          curl -sSL -o /tmp/z3.zip "https://github.com/Z3Prover/z3/releases/download/z3-${ver}/z3-${ver}-x64-glibc-2.31.zip"
          mkdir -p /tmp/z3 && unzip -q /tmp/z3.zip -d /tmp/z3
          lib=$(find /tmp/z3 -name 'libz3.so' | head -1)
          echo "SEK_Z3_LIB=$lib" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$(dirname "$lib"):${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "Provisioned Z3 native: $lib"

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate (build + explore all samples)
        shell: pwsh
        run: ./scripts/validate.ps1

      - name: Pack release assets
        shell: pwsh
        run: ./scripts/pack-extension.ps1 -Version ${{ steps.ver.outputs.version }} -Configuration Release

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --title "SpecExplorerKit v${{ steps.ver.outputs.version }}" \
            --notes-file "docs/release-notes/v${{ steps.ver.outputs.version }}.md" \
            "dist/spec-kit-sek.zip" \
            "dist/SpecExplorerKit.Tool.${{ steps.ver.outputs.version }}.nupkg"
