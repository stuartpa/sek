name: ci

# Continuous integration: on every push / PR, build the engine, run the unit-test
# suite, build every sample model, and run the sample-exploration regression gate
# (scripts/regression.ps1 against samples/regression.manifest.json). This protects the
# engine against regressions as new Cord sample projects are added.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Fetch Linux Z3 native (Microsoft.Z3 ships no linux-x64 libz3)
        shell: pwsh
        run: pwsh scripts/fetch-z3-linux.ps1

      - name: Build CLI
        run: dotnet build src/Sek.Cli/Sek.Cli.csproj -c Debug

      - name: Unit tests
        run: dotnet test tests/Sek.Tests/Sek.Tests.csproj -c Debug --nologo

      - name: Build sample models
        shell: bash
        run: |
          for proj in samples/*/Model/*.csproj; do
            echo "== building $proj =="
            dotnet build "$proj" -c Debug
          done

      - name: Sample-exploration regression gate
        shell: pwsh
        run: pwsh scripts/regression.ps1

      - name: Generated-test loop (Turnstile binding sample)
        shell: bash
        run: |
          set -e
          SEK=src/Sek.Cli/bin/Debug/sek.dll
          dotnet build samples/Turnstile/Sut/Turnstile.Sut.csproj -c Debug
          dotnet build samples/Turnstile/Model/Turnstile.Model.csproj -c Debug
          dotnet "$SEK" generate ModelProgram --project samples/Turnstile
          dotnet test samples/Turnstile/.specexplorerkit/out/ModelProgramTests --nologo

      - name: SEK self-validation loop (SelfHost — SEK models + tests its own CLI workflow)
        shell: bash
        run: |
          set -e
          SEK=src/Sek.Cli/bin/Debug/sek.dll
          # The SelfHost SUT drives the real sek CLI against the Turnstile sample.
          dotnet build samples/Turnstile/Model/Turnstile.Model.csproj -c Debug
          dotnet build samples/SelfHost/Sut/SelfHost.Sut.csproj -c Debug
          dotnet build samples/SelfHost/Model/SelfHost.Model.csproj -c Debug
          dotnet "$SEK" generate ModelProgram --project samples/SelfHost
          dotnet test samples/SelfHost/.specexplorerkit/out/ModelProgramTests --nologo
